# ── langflow-service.yaml ──────────────────────────────────────────────────────
# ClusterIP: only reachable within the cluster.
# Streamlit connects to http://langflow-service:7860

apiVersion: v1
kind: Service
metadata:
  name: langflow-service
  namespace: default
  labels:
    app: langflow
spec:
  selector:
    app: langflow
  ports:
    - name: http
      protocol: TCP
      port: 7860
      targetPort: 7860
  type: ClusterIP
