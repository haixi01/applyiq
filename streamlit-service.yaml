# ── streamlit-service.yaml ─────────────────────────────────────────────────────
# LoadBalancer: GKE provisions an external IP.
# This is what the grader sees in the browser URL bar.

apiVersion: v1
kind: Service
metadata:
  name: streamlit-service
  namespace: default
  labels:
    app: streamlit-app
spec:
  selector:
    app: streamlit-app
  ports:
    - name: http
      protocol: TCP
      port: 80           # External port — open http://<EXTERNAL-IP>  (no port needed)
      targetPort: 8501
  type: LoadBalancer
